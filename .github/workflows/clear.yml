name: 🗑️ Clear Contribution Art

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Year to clear (e.g. 2024), or type ALL to clear everything'
        required: true
      confirm:
        description: 'Type YES to confirm'
        required: true

jobs:
  clear:
    name: Clear output files
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Abort if not confirmed
        if: ${{ github.event.inputs.confirm != 'YES' }}
        run: |
          echo "You must type YES to confirm. Aborting."
          exit 1

      - name: Configure git identity
        run: |
          git config user.name  "JAVL1"
          git config user.email "jvar.cdn@gmail.com"

      - name: Delete output files for selected year
        run: |
          if [ "${{ github.event.inputs.year }}" = "ALL" ]; then
            git rm -f output/*.txt || echo "No files to remove"
          else
            git rm -f output/*${{ github.event.inputs.year }}*.txt || echo "No files for that year"
          fi
          git commit -m "🗑️ Clear contribution art (${{ github.event.inputs.year }})" || echo "Nothing to commit"

      - name: Push changes
        run: |
          git pull --rebase origin main
          git push origin HEAD:main
