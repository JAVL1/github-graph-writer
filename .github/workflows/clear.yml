name: 🗑️ Clear Contribution Art

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Year to clear (e.g. 2024), or type ALL to clear everything'
        required: true
      confirm:
        description: 'Type YES to confirm'
        required: true

jobs:
  clear:
    name: Clear output files
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Abort if not confirmed
        if: ${{ github.event.inputs.confirm != 'YES' }}
        run: |
          echo "You must type YES to confirm. Aborting."
          exit 1

      - name: Configure git identity
        run: |
          git config user.name  "JAVL1"
          git config user.email "jvar.cdn@gmail.com"

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Clear commits for selected year
        run: |
          if [ "${{ github.event.inputs.year }}" = "ALL" ]; then
            git filter-repo --path output/ --invert-paths --force
          else
            git filter-repo --path-glob "output/*${{ github.event.inputs.year }}*.txt" --invert-paths --force
          fi

      - name: Force push rewritten history
        run: |
          git remote add origin-push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin-push HEAD:main --force
